# ============================================================================
# Emoji Platform — Preview Docker Compose (TEMPLATE ONLY)
# ----------------------------------------------------------------------------
# 单台国内腾讯云小服务器的 Preview / Staging 部署模板。仅模板，不部署。
# 所有值通过 .env.preview 注入（见 .env.preview.example），本文件不含真实值。
# 预览期：db/meili/redis 仅内部网络，不映射公网端口；仅 nginx 暴露 80/443。
# 后台(admin)/api 建议仅经 SSH Tunnel / Tailscale 内网访问，不暴露公网。
# ============================================================================

services:
  # ─── 入口：仅 nginx 暴露公网 ────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: emoji-preview-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/preview.conf.example:/etc/nginx/conf.d/default.conf:ro
      # 证书挂载（预览期可选；IP 场景可免或用自签/隧道 TLS）
      # - ./certs:/etc/nginx/certs:ro
    depends_on:
      - web
      - admin
      - api
    networks:
      - preview
    logging:
      options:
        max-size: '10m'
        max-file: '3'

  # ─── Web (Next.js standalone) ───────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: emoji-preview-web
    restart: unless-stopped
    expose:
      - '3000'
    environment:
      NODE_ENV: production
      API_URL: http://api:4000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    depends_on:
      - api
    networks:
      - preview
    logging:
      options:
        max-size: '10m'
        max-file: '3'

  # ─── Admin (Next.js standalone) — 仅内网/隧道，不映射公网 ─────────────────
  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    container_name: emoji-preview-admin
    restart: unless-stopped
    expose:
      - '3001'
    environment:
      NODE_ENV: production
      API_URL: http://api:4000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_ADMIN_URL: ${NEXT_PUBLIC_ADMIN_URL:-http://localhost:3001}
    depends_on:
      - api
    networks:
      - preview
    logging:
      options:
        max-size: '10m'
        max-file: '3'

  # ─── API (NestJS) — 仅内网/隧道，不映射公网 ─────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: emoji-preview-api
    restart: unless-stopped
    expose:
      - '4000'
    environment:
      NODE_ENV: production
      API_PORT: '4000'
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      MEILISEARCH_HOST: ${MEILISEARCH_HOST:-http://meilisearch:7700}
      MEILISEARCH_API_KEY: ${MEILISEARCH_API_KEY}
      MEILISEARCH_INDEX_PREFIX: ${MEILISEARCH_INDEX_PREFIX:-emoji_platform_preview}
      SEARCH_PROVIDER: ${SEARCH_PROVIDER:-database}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000,http://localhost:3001}
      WEB_BASE_URL: ${WEB_BASE_URL:-http://localhost:3000}
      ADMIN_BASE_URL: ${ADMIN_BASE_URL:-http://localhost:3001}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - preview
    logging:
      options:
        max-size: '10m'
        max-file: '3'

  # ─── PostgreSQL — 仅内部网络 ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: emoji-preview-postgres
    restart: unless-stopped
    expose:
      - '5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-emoji_preview}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-emoji_platform_preview}
    volumes:
      - postgres_preview_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-emoji_preview}']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - preview
    logging:
      options:
        max-size: '10m'
        max-file: '3'

  # ─── Meilisearch — 仅内部网络；低配预览可注释掉并用 DB fallback ──────────
  meilisearch:
    image: getmeili/meilisearch:v1.8
    container_name: emoji-preview-meilisearch
    restart: unless-stopped
    expose:
      - '7700'
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY}
      MEILI_ENV: development
      MEILI_DB_PATH: /meili_data
      MEILI_NO_ANALYTICS: 'true'
    volumes:
      - meilisearch_preview_data:/meili_data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:7700/health']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - preview
    logging:
      options:
        max-size: '10m'
        max-file: '3'

  # ─── Redis（如被依赖；低配可评估移除） ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: emoji-preview-redis
    restart: unless-stopped
    expose:
      - '6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - preview
    logging:
      options:
        max-size: '10m'
        max-file: '3'

volumes:
  postgres_preview_data:
  meilisearch_preview_data:
  preview_backup:

networks:
  preview:
    driver: bridge
